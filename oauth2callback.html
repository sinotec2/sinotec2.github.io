<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>OAuth 回呼 — Vector Daily Brief</title>
  <style>body{font-family:system-ui,-apple-system,Segoe UI,Roboto,'Noto Sans TC',Helvetica,Arial;margin:24px;color:#111}h1{font-size:20px}pre{background:#f6f8fa;padding:12px;border-radius:6px;overflow:auto}button{margin-top:12px;padding:8px 12px}</style>
</head>
<body>
  <main>
    <h1>OAuth 回呼頁面</h1>
    <p>授權完成後，若網址列包含 <code>?code=...</code>，此頁會顯示授權碼（authorization code）。請複製下方的授權碼並貼回到授權流程頁面以便交換 token。</p>
    <div id="status">正在檢查 URL...</div>
    <pre id="codeArea"></pre>
    <button id="copyBtn" style="display:none">複製授權碼到剪貼簿</button>
    <script>
      function parseQuery(){
        const q = new URLSearchParams(window.location.search);
        const code = q.get('code');
        const error = q.get('error');
        const errorDesc = q.get('error_description');
        const out = document.getElementById('codeArea');
        const status = document.getElementById('status');
        const copyBtn = document.getElementById('copyBtn');
        if(code){
          status.textContent = '授權成功：請複製下方授權碼（code）並回傳給授權流程以換取 token。';
          out.textContent = code;
          copyBtn.style.display = 'inline-block';
          copyBtn.addEventListener('click', ()=>{navigator.clipboard.writeText(code)});
        } else if(error){
          status.textContent = '授權失敗：'+(errorDesc||error);
          out.textContent = window.location.href;
        } else {
          status.textContent = '此頁會在授權完成後顯示授權碼，請在授權完成時使用提供的 redirect URI。';
          out.textContent = window.location.href;
        }
      }
      parseQuery();
    </script>
  </main>
</body>
</html>
